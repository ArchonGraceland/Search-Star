name: Deploy v3 to Production

on:
  push:
    branches:
      - v3

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy v3 to Vercel production
        run: |
          curl -s -X POST "https://api.vercel.com/v13/deployments?teamId=team_3QGOH2gaQBtEyFzCX7wtsP7X" \
            -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "name": "search-star",
              "project": "prj_4naGexGhfiklNAPntvurIkFWH5Nh",
              "gitSource": {
                "type": "github",
                "repoId": "1195319136",
                "ref": "v3",
                "sha": "${{ github.sha }}"
              },
              "target": "production"
            }' | python3 -c "
import sys,json
d=json.load(sys.stdin)
print('url:', d.get('url'))
print('state:', d.get('readyState'))
if 'error' in d:
    print('error:', d['error'])
    exit(1)
"
