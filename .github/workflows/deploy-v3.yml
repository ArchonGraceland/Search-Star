name: Deploy v3 to Production

on:
  push:
    branches:
      - v3

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel production deploy
        run: |
          curl -s "https://api.vercel.com/v1/integrations/deploy/prj_4naGexGhfiklNAPntvurIkFWH5Nh/18KXg8wIGM" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print('state:', d.get('job',{}).get('state','?'))"
