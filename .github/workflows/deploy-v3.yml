name: Deploy v3 to Production

on:
  push:
    branches:
      - v3

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel deploy hook
        id: trigger
        run: |
          RESPONSE=$(curl -s "https://api.vercel.com/v1/integrations/deploy/prj_4naGexGhfiklNAPntvurIkFWH5Nh/18KXg8wIGM")
          JOB_ID=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin).get('job',{}).get('id',''))")
          echo "job_id=$JOB_ID" >> $GITHUB_OUTPUT
          echo "Triggered deploy job: $JOB_ID"

      - name: Wait for deployment to be READY
        id: wait
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          echo "Waiting for deployment..."
          for i in $(seq 1 24); do
            sleep 15
            RESULT=$(curl -s "https://api.vercel.com/v6/deployments?projectId=prj_4naGexGhfiklNAPntvurIkFWH5Nh&teamId=team_3QGOH2gaQBtEyFzCX7wtsP7X&limit=1" \
              -H "Authorization: Bearer $VERCEL_TOKEN")
            STATE=$(echo "$RESULT" | python3 -c "import sys,json; d=json.load(sys.stdin)['deployments'][0]; print(d['readyState'])")
            DEPLOY_ID=$(echo "$RESULT" | python3 -c "import sys,json; d=json.load(sys.stdin)['deployments'][0]; print(d['uid'])")
            echo "Attempt $i: $STATE ($DEPLOY_ID)"
            if [ "$STATE" = "READY" ]; then
              echo "deploy_id=$DEPLOY_ID" >> $GITHUB_OUTPUT
              break
            fi
            if [ "$STATE" = "ERROR" ]; then
              echo "Deploy failed with ERROR state"
              exit 1
            fi
          done

      - name: Promote to production aliases
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          DEPLOY_ID="${{ steps.wait.outputs.deploy_id }}"
          echo "Promoting $DEPLOY_ID to searchstar.com..."
          for ALIAS in "searchstar.com" "www.searchstar.com"; do
            RESULT=$(curl -s -X POST "https://api.vercel.com/v2/deployments/$DEPLOY_ID/aliases?teamId=team_3QGOH2gaQBtEyFzCX7wtsP7X" \
              -H "Authorization: Bearer $VERCEL_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"alias\": \"$ALIAS\"}")
            echo "$ALIAS: $(echo $RESULT | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('alias', d.get('error','?')))")"
          done
